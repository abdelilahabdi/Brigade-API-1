
openapi: 3.1.0
info:
  title: RestaurantAI-Brigade API (V2)
  version: 2.0.0
  description: Finalized OpenAPI for RestaurantAI-Brigade API V2.
servers:
  - url: http://127.0.0.1:8000/api
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Profile
  - name: Categories
  - name: Plates
  - name: Ingredients
  - name: Recommendations
  - name: Admin Stats

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Token

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer
    PlateIdParam:
      name: plate_id
      in: path
      required: true
      schema:
        type: integer

  responses:
    Unauthorized:
      description: Unauthenticated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UnauthenticatedError'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ForbiddenError'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NotFoundError'
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [client, admin]
        dietary_tags:
          type: array
          items:
            type: string
            enum: [vegan, no_sugar, no_cholesterol, gluten_free, no_lactose]

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          maxLength: 100
        description:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
        is_active:
          type: boolean

    Ingredient:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        tags:
          type: array
          items:
            type: string
            enum: [contains_meat, contains_sugar, contains_cholesterol, contains_gluten, contains_lactose]

    Plate:
      type: object
      properties:
        id:
          type: integer
        category_id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: string
        image:
          type: string
          nullable: true
        is_available:
          type: boolean
        category:
          $ref: '#/components/schemas/Category'
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/Ingredient'

    ConflictTag:
      type: object
      properties:
        dietary_tag:
          type: string
          enum: [vegan, no_sugar, no_cholesterol, gluten_free, no_lactose]
        ingredient_tag:
          type: string
          enum: [contains_meat, contains_sugar, contains_cholesterol, contains_gluten, contains_lactose]

    Recommendation:
      type: object
      properties:
        plate:
          $ref: '#/components/schemas/Plate'
        score:
          type: number
          nullable: true
        label:
          type: string
          nullable: true
        warning_message:
          type: string
          nullable: true
        conflicting_tags:
          type: array
          items:
            $ref: '#/components/schemas/ConflictTag'
        status:
          type: string
          enum: [processing, ready, failed]

    RegisterRequest:
      type: object
      required: [name, email, password, password_confirmation, role]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        password_confirmation:
          type: string
        role:
          type: string
          enum: [client, admin]
        dietary_tags:
          type: array
          items:
            type: string
            enum: [vegan, no_sugar, no_cholesterol, gluten_free, no_lactose]

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    UpdateProfileRequest:
      type: object
      required: [dietary_tags]
      properties:
        dietary_tags:
          type: array
          items:
            type: string
            enum: [vegan, no_sugar, no_cholesterol, gluten_free, no_lactose]

    StoreCategoryRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 100
        description:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
          pattern: '^#(?:[0-9a-fA-F]{3}|[0-9a-fA-F]{6})$'
        is_active:
          type: boolean

    UpdateCategoryRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 100
        description:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
          pattern: '^#(?:[0-9a-fA-F]{3}|[0-9a-fA-F]{6})$'
        is_active:
          type: boolean

    StorePlateRequest:
      type: object
      required: [name, price, category_id]
      properties:
        name:
          type: string
          maxLength: 100
        description:
          type: string
          nullable: true
        price:
          type: number
          exclusiveMinimum: 0
        image:
          type: string
          nullable: true
        is_available:
          type: boolean
        category_id:
          type: integer
        ingredient_ids:
          type: array
          items:
            type: integer

    UpdatePlateRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        description:
          type: string
          nullable: true
        price:
          type: number
          exclusiveMinimum: 0
        image:
          type: string
          nullable: true
        is_available:
          type: boolean
        category_id:
          type: integer
        ingredient_ids:
          type: array
          items:
            type: integer

    StoreIngredientRequest:
      type: object
      required: [name, tags]
      properties:
        name:
          type: string
          maxLength: 100
        tags:
          type: array
          items:
            type: string
            enum: [contains_meat, contains_sugar, contains_cholesterol, contains_gluten, contains_lactose]

    UpdateIngredientRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        tags:
          type: array
          items:
            type: string
            enum: [contains_meat, contains_sugar, contains_cholesterol, contains_gluten, contains_lactose]

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    AuthResponse:
      type: object
      properties:
        message:
          type: string
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string

    ProfileResponse:
      type: object
      properties:
        message:
          type: string
        profile:
          $ref: '#/components/schemas/User'

    ValidationError:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    UnauthenticatedError:
      type: object
      properties:
        message:
          type: string

    ForbiddenError:
      type: object
      properties:
        message:
          type: string

    NotFoundError:
      type: object
      properties:
        message:
          type: string

    ProcessingRecommendationResponse:
      type: object
      properties:
        message:
          type: string
        status:
          type: string
          enum: [processing]
        plate_id:
          type: integer

paths:
  /register:
    post:
      tags: [Auth]
      security: []
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /login:
    post:
      tags: [Auth]
      security: []
      summary: Login and get token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /logout:
    post:
      tags: [Auth]
      summary: Logout current token
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /me:
    get:
      tags: [Auth]
      summary: Get authenticated user
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /profile:
    get:
      tags: [Profile]
      summary: Get dietary profile
      responses:
        '200':
          description: Profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [Profile]
      summary: Update dietary profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /categories:
    get:
      tags: [Categories]
      summary: List categories
      parameters:
        - name: active
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Categories list
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Category'
                  filters:
                    type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
    post:
      tags: [Categories]
      summary: Create category (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreCategoryRequest'
      responses:
        '201':
          description: Category created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Category'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  /categories/{id}:
    get:
      tags: [Categories]
      summary: Get category by id
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Category details
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Category'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Categories]
      summary: Update category (admin only)
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCategoryRequest'
      responses:
        '200':
          description: Category updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Category'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Categories]
      summary: Delete category (admin only)
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Category deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Active plates still linked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /categories/{id}/plates:
    get:
      tags: [Categories]
      summary: List plates by category
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - name: include_unavailable
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Category plates
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /plates:
    get:
      tags: [Plates]
      summary: List plates
      parameters:
        - name: available
          in: query
          required: false
          schema:
            type: boolean
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Paginated plates
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                  filters:
                    type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
    post:
      tags: [Plates]
      summary: Create plate (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StorePlateRequest'
      responses:
        '201':
          description: Plate created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Plate'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  /plates/{id}:
    get:
      tags: [Plates]
      summary: Get plate by id
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Plate details
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Plate'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Plates]
      summary: Update plate (admin only)
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePlateRequest'
      responses:
        '200':
          description: Plate updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Plate'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Plates]
      summary: Delete plate (admin only)
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Plate deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /ingredients:
    get:
      tags: [Ingredients]
      summary: List ingredients (admin only)
      parameters:
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Paginated ingredients
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Ingredients]
      summary: Create ingredient (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreIngredientRequest'
      responses:
        '201':
          description: Ingredient created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Ingredient'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  /ingredients/{id}:
    put:
      tags: [Ingredients]
      summary: Update ingredient (admin only)
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateIngredientRequest'
      responses:
        '200':
          description: Ingredient updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Ingredient'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Ingredients]
      summary: Delete ingredient (admin only)
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Ingredient deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /recommendations/analyze/{plate_id}:
    post:
      tags: [Recommendations]
      summary: Launch async recommendation analysis
      parameters:
        - $ref: '#/components/parameters/PlateIdParam'
      responses:
        '202':
          description: Analysis queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessingRecommendationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /recommendations:
    get:
      tags: [Recommendations]
      summary: Get recommendation history for authenticated user
      parameters:
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Paginated recommendations
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /recommendations/{plate_id}:
    get:
      tags: [Recommendations]
      summary: Get recommendation for a specific plate
      parameters:
        - $ref: '#/components/parameters/PlateIdParam'
      responses:
        '200':
          description: Recommendation processing or ready
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ProcessingRecommendationResponse'
                  - type: object
                    properties:
                      message:
                        type: string
                      data:
                        $ref: '#/components/schemas/Recommendation'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/stats:
    get:
      tags: [Admin Stats]
      summary: Get global system statistics (admin only)
      responses:
        '200':
          description: Statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      totals:
                        type: object
                      recommendations:
                        type: object
                      categories:
                        type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
