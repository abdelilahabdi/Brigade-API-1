openapi: 3.1.0
info:
  title: Brigade API
  version: 1.0.0
  description: REST API for Brigade restaurant administrators (Laravel + Sanctum).
servers:
  - url: http://127.0.0.1:8000/api
    description: Local development server

tags:
  - name: Auth
    description: Authentication endpoints
  - name: Categories
    description: Category management for the authenticated restaurant
  - name: Plats
    description: Plat management for the authenticated restaurant
  - name: Category-Plats Association
    description: Attach existing plats to a category

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Token

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      description: Resource identifier
      schema:
        type: integer
        example: 1

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Admin One
        email:
          type: string
          format: email
          example: admin@brigade.test
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Restaurant:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Resto One
        user_id:
          type: integer
          example: 1
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Category:
      type: object
      properties:
        id:
          type: integer
          example: 10
        name:
          type: string
          example: Burgers
        description:
          type: string
          nullable: true
          example: Signature burgers
        restaurant_id:
          type: integer
          example: 1
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Plat:
      type: object
      properties:
        id:
          type: integer
          example: 15
        name:
          type: string
          example: Burger Maison
        description:
          type: string
          nullable: true
          example: Double steak, cheddar
        price:
          type: string
          example: "89.90"
        stock:
          type: integer
          example: 10
        category_id:
          type: integer
          example: 10
        restaurant_id:
          type: integer
          example: 1
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required: [name, email, password, password_confirmation, restaurant_name]
      properties:
        name:
          type: string
          maxLength: 255
          example: Admin One
        email:
          type: string
          format: email
          maxLength: 255
          example: admin@brigade.test
        password:
          type: string
          minLength: 8
          example: password123
        password_confirmation:
          type: string
          example: password123
        restaurant_name:
          type: string
          maxLength: 255
          example: Resto One

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: admin@brigade.test
        password:
          type: string
          example: password123

    StoreCategoryRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 255
          example: Burgers
        description:
          type: string
          nullable: true
          example: Signature burgers

    UpdateCategoryRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 255
          example: Burgers Premium
        description:
          type: string
          nullable: true
          example: Updated description

    StorePlatRequest:
      type: object
      required: [name, price, stock, category_id]
      properties:
        name:
          type: string
          maxLength: 255
          example: Burger Maison
        description:
          type: string
          nullable: true
          example: Double steak, cheddar
        price:
          type: number
          minimum: 0
          example: 89.9
        stock:
          type: integer
          minimum: 0
          example: 10
        category_id:
          type: integer
          example: 10

    UpdatePlatRequest:
      type: object
      required: [name, price, stock, category_id]
      properties:
        name:
          type: string
          maxLength: 255
          example: Burger Maison XL
        description:
          type: string
          nullable: true
          example: Triple steak, cheddar
        price:
          type: number
          minimum: 0
          example: 109.9
        stock:
          type: integer
          minimum: 0
          example: 8
        category_id:
          type: integer
          example: 10

    AttachPlatsToCategoryRequest:
      type: object
      required: [plat_ids]
      properties:
        plat_ids:
          type: array
          minItems: 1
          items:
            type: integer
          example: [15, 16, 17]

    RegisterResponse:
      type: object
      properties:
        message:
          type: string
          example: Utilisateur enregistre avec succes.
        user:
          $ref: '#/components/schemas/User'
        restaurant:
          $ref: '#/components/schemas/Restaurant'
        token:
          type: string
          example: 1|abcdefghijklmno

    LoginResponse:
      type: object
      properties:
        message:
          type: string
          example: Connexion reussie.
        user:
          allOf:
            - $ref: '#/components/schemas/User'
            - type: object
              properties:
                restaurant:
                  $ref: '#/components/schemas/Restaurant'
        token:
          type: string
          example: 2|abcdefghijklmno

    UserResponse:
      type: object
      properties:
        message:
          type: string
          example: Utilisateur authentifie recupere.
        user:
          allOf:
            - $ref: '#/components/schemas/User'
            - type: object
              properties:
                restaurant:
                  $ref: '#/components/schemas/Restaurant'

    MessageResponse:
      type: object
      properties:
        message:
          type: string
          example: Operation terminee avec succes.

    CategoryCollectionResponse:
      type: object
      properties:
        message:
          type: string
          example: Categories recuperees avec succes.
        data:
          type: array
          items:
            $ref: '#/components/schemas/Category'

    CategoryResourceResponse:
      type: object
      properties:
        message:
          type: string
          example: Categorie recuperee avec succes.
        data:
          $ref: '#/components/schemas/Category'

    PlatCollectionResponse:
      type: object
      properties:
        message:
          type: string
          example: Plats recuperes avec succes.
        data:
          type: array
          items:
            allOf:
              - $ref: '#/components/schemas/Plat'
              - type: object
                properties:
                  category:
                    $ref: '#/components/schemas/Category'

    PlatResourceResponse:
      type: object
      properties:
        message:
          type: string
          example: Plat recupere avec succes.
        data:
          allOf:
            - $ref: '#/components/schemas/Plat'
            - type: object
              properties:
                category:
                  $ref: '#/components/schemas/Category'

    AttachPlatsSuccessResponse:
      type: object
      properties:
        message:
          type: string
          example: Plats associes a la categorie avec succes.
        data:
          type: object
          properties:
            category:
              $ref: '#/components/schemas/Category'
            plats:
              type: array
              items:
                allOf:
                  - $ref: '#/components/schemas/Plat'
                  - type: object
                    properties:
                      category:
                        $ref: '#/components/schemas/Category'

    UnauthorizedError:
      type: object
      properties:
        message:
          type: string
          example: Unauthenticated.

    ForbiddenError:
      type: object
      properties:
        message:
          type: string
          example: This action is unauthorized.

    AttachForbiddenError:
      type: object
      properties:
        message:
          type: string
          example: Un ou plusieurs plats ne sont pas autorises pour ce restaurant.
        invalid_plat_ids:
          type: array
          items:
            type: integer
          example: [99]

    NotFoundError:
      type: object
      properties:
        message:
          type: string
          example: Categorie introuvable.

    ValidationError:
      type: object
      properties:
        message:
          type: string
          example: The given data was invalid.
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

paths:
  /register:
    post:
      tags: [Auth]
      summary: Register a new user and restaurant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /login:
    post:
      tags: [Auth]
      summary: Login and generate a Sanctum token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /logout:
    post:
      tags: [Auth]
      summary: Logout (invalidate current token)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'

  /user:
    get:
      tags: [Auth]
      summary: Get authenticated user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'

  /categories:
    get:
      tags: [Categories]
      summary: List categories for the authenticated restaurant
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Categories list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryCollectionResponse'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '404':
          description: Restaurant not found for user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'

    post:
      tags: [Categories]
      summary: Create a category for the authenticated restaurant
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreCategoryRequest'
      responses:
        '201':
          description: Category created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResourceResponse'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '404':
          description: Restaurant not found for user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /categories/{id}:
    get:
      tags: [Categories]
      summary: Get one category
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Category found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResourceResponse'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Forbidden by policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'

    put:
      tags: [Categories]
      summary: Update one category
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCategoryRequest'
      responses:
        '200':
          description: Category updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResourceResponse'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Forbidden by policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

    delete:
      tags: [Categories]
      summary: Delete one category
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Category deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Forbidden by policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'

  /plats:
    get:
      tags: [Plats]
      summary: List plats for the authenticated restaurant
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Plats list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatCollectionResponse'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '404':
          description: Restaurant not found for user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'

    post:
      tags: [Plats]
      summary: Create a plat
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StorePlatRequest'
      responses:
        '201':
          description: Plat created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatResourceResponse'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '404':
          description: Restaurant not found for user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /plats/{id}:
    get:
      tags: [Plats]
      summary: Get one plat
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Plat found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatResourceResponse'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Forbidden by policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'

    put:
      tags: [Plats]
      summary: Update one plat
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePlatRequest'
      responses:
        '200':
          description: Plat updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatResourceResponse'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Forbidden by policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

    delete:
      tags: [Plats]
      summary: Delete one plat
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Plat deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Forbidden by policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'

  /categories/{id}/plats:
    post:
      tags: [Category-Plats Association]
      summary: Attach multiple plats to one category
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttachPlatsToCategoryRequest'
      responses:
        '200':
          description: Plats attached successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttachPlatsSuccessResponse'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Forbidden by policy or external plats
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ForbiddenError'
                  - $ref: '#/components/schemas/AttachForbiddenError'
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
